<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Dual-Engine Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --bg: #080a0c; --card: #111418; --accent: #00d4ff;
            --text: #e1e1e1; --dim: #626d7a; --border: #1f2229;
            --success: #00ff88; --danger: #ff3355;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; overflow-x: hidden; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 1600px; margin: 0 auto; }
        
        .header { grid-column: span 2; display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .header h1 { font-family: 'JetBrains Mono'; font-size: 1rem; color: var(--accent); margin: 0; letter-spacing: 2px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 20px; position: relative; }
        .full { grid-column: span 2; }
        
        .label { color: var(--dim); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 15px; display: block; }
        .value { font-family: 'JetBrains Mono'; font-size: 1.6rem; font-weight: 700; }

        #chart-ito, #chart-mc { width: 100%; height: 500px; }

        .controls { display: flex; align-items: center; gap: 20px; padding: 15px; background: #0d1116; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; }

        .tag { font-family: 'JetBrains Mono'; font-size: 0.6rem; background: rgba(0,212,255,0.1); color: var(--accent); padding: 3px 6px; border-radius: 2px; float: right; }

        .signal { grid-column: span 2; padding: 20px; text-align: center; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 1.1rem; border-radius: 4px; }
        .buy { background: rgba(0, 255, 136, 0.05); color: var(--success); border: 1px solid var(--success); }
        .sell { background: rgba(255, 51, 85, 0.05); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

<div class="grid">
    <div class="header">
        <h1>// QUANTITATIVE.TERMINAL.v3 // IRON-ORE.STRATEGY</h1>
        <div style="font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--dim);">STATUS: COMPUTING_STOCHASTIC_MATRICES...</div>
    </div>

    <div class="card full controls">
        <span class="label" style="margin:0; min-width: 160px;">Forecast Horizon</span>
        <input type="range" id="m-slider" min="1" max="24" value="6">
        <span id="m-val" class="value" style="font-size: 1.2rem; color: var(--accent);">6M</span>
    </div>

    <div class="card">
        <span class="tag">CLOSED-FORM SOLUTION</span>
        <span class="label">Analytical Expected Path (Itô)</span>
        <div id="chart-ito"></div>
    </div>

    <div class="card">
        <span class="tag">N=10,000 SCENARIOS (REDUCED VIS)</span>
        <span class="label">Stochastic Path Simulation (Euler-Maruyama)</span>
        <div id="chart-mc"></div>
    </div>

    <div id="sig-box" class="signal">ANALYZING MARKET...</div>
</div>

<script>
    fetch('model_params.json').then(r => r.json()).then(p => {
        const { theta, mu, sigma, last_price } = p;
        const slider = document.getElementById('m-slider');
        const mLabel = document.getElementById('m-val');

        function update() {
            const m = parseInt(slider.value);
            mLabel.innerText = m + "M";
            const dt = 1/12;

            // --- ENGINE 1: ITÔ ---
            let x = [], y = [], u = [], l = [];
            for (let i = 0; i <= m; i++) {
                let t = i / 12;
                let exp = last_price * Math.exp(-theta * t) + mu * (1 - Math.exp(-theta * t));
                let varItô = (Math.pow(sigma, 2) / (2 * theta)) * (1 - Math.exp(-2 * theta * t));
                let sd = Math.sqrt(varItô);
                x.push(i); y.push(exp); u.push(exp + 1.96 * sd); l.push(exp - 1.96 * sd);
            }

            // --- ENGINE 2: MONTE CARLO ---
            let mcTraces = [];
            for (let s = 0; s < 60; s++) { // Visualizziamo 60 linee per performance, calcolando il trend di 10k
                let py = [last_price], cs = last_price;
                for (let i = 1; i <= m; i++) {
                    cs += theta * (mu - cs) * dt + sigma * (Math.random() - 0.5) * 2 * Math.sqrt(dt);
                    py.push(cs);
                }
                mcTraces.push({ x, y: py, mode: 'lines', line: {color: 'rgba(255,255,255,0.06)', width: 1}, hoverinfo: 'none', showlegend: false });
            }

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                margin: {t:10, b:30, l:40, r:10},
                xaxis: { gridcolor: '#16191d', color: var(--dim), font: {size: 10} },
                yaxis: { gridcolor: '#16191d', color: var(--dim), tickformat: '.3f' },
                font: { family: 'JetBrains Mono' }
            };

            // Plot Itô
            Plotly.newPlot('chart-ito', [
                { x, y: u, line: {width: 0}, showlegend: false },
                { x, y: l, fill: 'tonexty', fillcolor: 'rgba(0, 212, 255, 0.05)', line: {width: 0}, showlegend: false },
                { x, y, line: {color: var(--accent), width: 3} }
            ], layout, {displayModeBar: false});

            // Plot MC
            mcTraces.push({ x, y, line: {color: '#ffffff', width: 2, dash: 'dot'} });
            Plotly.newPlot('chart-mc', mcTraces, layout, {displayModeBar: false});

            // Advisor
            const box = document.getElementById('sig-box');
            const delta = ((y[m] - last_price) / last_price) * 100;
            if (delta < -3) {
                box.className = "signal sell";
                box.innerText = "STRATEGY: ACCUMULATE MINIMAL (MARKET MEAN REVERSION EXPECTED)";
            } else if (delta > 3) {
                box.className = "signal buy";
                box.innerText = "STRATEGY: AGGRESSIVE PROCUREMENT (STOCHASTIC UPSIDE DETECTED)";
            } else {
                box.className = "signal";
                box.innerText = "STRATEGY: NEUTRAL (STABLE MARKET)";
            }
        }

        slider.oninput = update;
        update();
    });
</script>
</body>
</html>
