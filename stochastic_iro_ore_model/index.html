<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Prezzi Ferro | Trading Intel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-weight: 700; color: var(--primary); font-size: 1.6rem; text-align: center; }
        .data-info { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 20px; padding: 10px; background: #e8f0fe; border-radius: 10px; }
        
        #chart { width: 100%; height: 400px; }
        
        .controls { background: #f1f3f4; padding: 25px; border-radius: 15px; margin: 20px 0; }
        .controls label { font-weight: 600; color: #3c4043; display: flex; justify-content: space-between; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 10px; background: #d1d4d7; outline: none; margin-top: 15px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        .signal-container { text-align: center; margin-top: 10px; }
        .signal-badge { display: inline-block; padding: 12px 30px; border-radius: 100px; font-weight: 700; font-size: 1.1rem; border: 1px solid transparent; }
        .buy { background: #e6ffed; color: #22863a; border-color: #22863a; }
        .wait { background: #ffeef0; color: #cb2431; border-color: #cb2431; }
        .neutral { background: #fff8e1; color: #b78103; border-color: #b78103; }
    </style>
</head>
<body>

<div class="container">
    <h1>Iron Ore Procurement Radar</h1>
    <div class="data-info" id="data-status">Caricamento...</div>

    <div id="chart"></div>

    <div class="controls">
        <label>
            <span>Orizzonte Temporale (Mesi)</span>
            <span id="month-display" style="color: var(--primary);">3 Mesi</span>
        </label>
        <input type="range" id="month-slider" min="1" max="12" value="3">
    </div>

    <div class="signal-container">
        <div id="signal" class="signal-badge neutral">Analisi...</div>
    </div>
</div>

<script>
    fetch('model_params.json')
    .then(response => response.json())
    .then(params => {
        const { theta, mu, sigma, last_price, last_date } = params;
        
        document.getElementById('data-status').innerHTML = 
            `<b>Ultimo Prezzo Spot:</b> ${last_price.toFixed(3)} €/kg | <b>Aggiornato al:</b> ${last_date}`;

        function render() {
            const months = parseInt(document.getElementById('month-slider').value);
            document.getElementById('month-display').innerText = `${months} Mesi`;

            let xData = [], yData = [], yUpper = [], yLower = [];

            for (let i = 0; i <= months; i++) {
                let t = i / 12; // Tempo annualizzato

                // --- RISOLUZIONE ANALITICA (Lemma di Itô) ---
                // 1. Expected Value (Mean Reversion)
                let expected = last_price * Math.exp(-theta * t) + mu * (1 - Math.exp(-theta * t));
                
                // 2. Variance (Itô's Variance Scheme)
                let variance = (Math.pow(sigma, 2) / (2 * theta)) * (1 - Math.exp(-2 * theta * t));
                let stdev = Math.sqrt(variance);

                xData.push(`Mese +${i}`);
                yData.push(expected);
                yUpper.push(expected + (1.96 * stdev)); // 95% Confidence
                yLower.push(expected - (1.96 * stdev));
            }

            // --- CONFIGURAZIONE GRAFICO ---
            const traceForecast = {
                x: xData, y: yData, name: 'Target Price',
                line: { color: '#1a73e8', width: 4, shape: 'spline' },
                mode: 'lines+markers'
            };

            const traceUpper = {
                x: xData, y: yUpper, name: 'Confidence High',
                line: { width: 0 }, showlegend: false, type: 'scatter'
            };

            const traceLower = {
                x: xData, y: yLower, name: 'Cono di Rischio (Itô)',
                fill: 'tonexty', fillcolor: 'rgba(26, 115, 232, 0.08)',
                line: { width: 0 }, type: 'scatter'
            };

            const layout = {
                hovermode: 'x unified',
                showlegend: false,
                margin: { l: 50, r: 20, t: 20, b: 50 },
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                yaxis: { gridcolor: '#f1f3f4', zeroline: false, tickformat: '.3f', title: '€ / kg' },
                xaxis: { showgrid: false }
            };

            Plotly.newPlot('chart', [traceUpper, traceLower, traceForecast], layout, {responsive: true});

            // --- LOGICA SEMAFORO DECISORE (Z-Score Implicit) ---
            const finalForecast = yData[months];
            const change = ((finalForecast - last_price) / last_price) * 100;
            const signalDiv = document.getElementById('signal');

            if (change < -2.5) { // Prezzo in calo statistico
                signalDiv.className = "signal-badge buy";
                signalDiv.innerHTML = "CONSIGLIO: ATTENDERE ACQUISTO 🟢<br><small>Il prezzo del grezzo è caro e tende a scendere.</small>";
            } else if (change > 2.5) { // Prezzo in rialzo statistico
                signalDiv.className = "signal-badge wait";
                signalDiv.innerHTML = "CONSIGLIO: ACQUISTARE SCORTE 🔴<br><small>Rischio rialzo prezzi imminente.</small>";
            } else {
                signalDiv.className = "signal-badge neutral";
                signalDiv.innerHTML = "CONSIGLIO: ACQUISTO REGOLARE 🟡<br><small>Mercato stabile, in linea con la media.</small>";
            }
        }

        document.getElementById('month-slider').addEventListener('input', render);
        render(); // Primo avvio
    });
</script>

</body>
</html>
