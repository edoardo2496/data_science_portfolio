<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Ore Forecast | Trading Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #b78103;
            --border: #e0e0e0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { 
            max-width: 1000px; 
            width: 100%;
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
        }

        h1 { 
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--primary);
            margin: 0 0 5px 0;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #5f6368;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* Grid delle Statistiche */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-label { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: #70757a; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--text); 
        }

        /* Grafico */
        #chart { 
            width: 100%; 
            height: 450px; 
            margin-bottom: 20px;
        }

        /* Controlli */
        .controls {
            background: #f1f3f4;
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .controls-header label { font-weight: 600; color: #3c4043; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: #d1d4d7;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* Badge Semaforo */
        .signal-container {
            text-align: center;
            margin-top: 10px;
        }

        .signal-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .buy { background: #e6ffed; color: #22863a; border: 1px solid #22863a; }
        .wait { background: #ffeef0; color: #cb2431; border: 1px solid #cb2431; }
        .neutral { background: #fff8e1; color: #b78103; border: 1px solid #b78103; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Iron Ore Intelligent Radar</h1>
    <p class="subtitle">Modello Predittivo Stocastico • Basato su Lemma di Itô</p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Prezzo Attuale Spot</div>
            <div id="price-val" class="stat-value">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Data Rilevazione</div>
            <div id="date-val" class="stat-value">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Target a <span id="target-month-label">3</span> Mesi</div>
            <div id="forecast-val" class="stat-value">--</div>
        </div>
    </div>

    <div id="chart"></div>

    <div class="controls">
        <div class="controls-header">
            <label>Orizzonte Temporale Forecast</label>
            <span id="month-display" style="color: var(--primary); font-weight: 700;">3 Mesi</span>
        </div>
        <input type="range" id="month-slider" min="1" max="12" value="3">
    </div>

    <div class="signal-container">
        <div id="signal" class="signal-badge neutral">Analisi in corso...</div>
    </div>
</div>

<script>
    // Recupero Parametri
    fetch('model_params.json')
    .then(response => response.json())
    .then(params => {
        const { theta, mu, sigma, last_price, last_date } = params;
        
        // Setup Iniziale Card
        document.getElementById('price-val').innerText = `${last_price.toFixed(3)} €/kg`;
        document.getElementById('date-val').innerText = last_date;

        function render() {
            const months = parseInt(document.getElementById('month-slider').value);
            document.getElementById('month-display').innerText = `${months} Mesi`;
            document.getElementById('target-month-label').innerText = months;

            let xData = [], yData = [], yUpper = [], yLower = [];

            for (let i = 0; i <= months; i++) {
                let t = i / 12;
                // Matematica OU via Itô
                let expected = last_price * Math.exp(-theta * t) + mu * (1 - Math.exp(-theta * t));
                let variance = (Math.pow(sigma, 2) / (2 * theta)) * (1 - Math.exp(-2 * theta * t));
                let stdev = Math.sqrt(variance);

                xData.push(`Mese +${i}`);
                yData.push(expected);
                yUpper.push(expected + (1.96 * stdev));
                yLower.push(expected - (1.96 * stdev));
            }

            // Update Target Card
            const finalPrice = yData[months];
            document.getElementById('forecast-val').innerText = `${finalPrice.toFixed(3)} €/kg`;

            // Configurazione Grafico Plotly
            const traceMain = {
                x: xData, y: yData, name: 'Target Price',
                line: { color: '#1a73e8', width: 4, shape: 'spline' },
                mode: 'lines+markers'
            };

            const traceUpper = {
                x: xData, y: yUpper, name: 'Confidence High',
                line: { width: 0 }, showlegend: false, type: 'scatter'
            };

            const traceLower = {
                x: xData, y: yLower, name: 'Area di Rischio (Itô)',
                fill: 'tonexty', fillcolor: 'rgba(26, 115, 232, 0.08)',
                line: { width: 0 }, type: 'scatter'
            };

            const layout = {
                hovermode: 'x unified',
                showlegend: false,
                margin: { l: 50, r: 20, t: 20, b: 50 },
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                yaxis: { 
                    gridcolor: '#f1f3f4', 
                    zeroline: false, 
                    tickformat: '.3f',
                    title: 'Prezzo stimato (€/kg)'
                },
                xaxis: { showgrid: false }
            };

            Plotly.newPlot('chart', [traceUpper, traceLower, traceMain], layout, {responsive: true});

            // Logica Semaforo Decisore
            const change = ((finalPrice - last_price) / last_price) * 100;
            const signal = document.getElementById('signal');

            if (change < -2.5) {
                signal.className = "signal-badge buy";
                signal.innerHTML = "CONSIGLIO: ATTENDERE ACQUISTO 🟢";
            } else if (change > 2.5) {
                signal.className = "signal-badge wait";
                signal.innerHTML = "CONSIGLIO: ACQUISTARE SCORTE 🔴";
            } else {
                signal.className = "signal-badge neutral";
                signal.innerHTML = "CONSIGLIO: ACQUISTO REGOLARE 🟡";
            }
        }

        document.getElementById('month-slider').addEventListener('input', render);
        render(); // Primo avvio
    });
</script>

</body>
</html>
